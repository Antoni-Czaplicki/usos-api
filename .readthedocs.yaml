version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      # Install uv
      - pip install uv
    post_install:
      # Install dependencies with 'docs' dependency group
      - uv export --format requirements.txt --group docs | uv pip install --python $READTHEDOCS_VIRTUALENV_PATH -r /dev/stdin

sphinx:
  configuration: docs/conf.py
